{{ end }}{{ end }}name: Repo Config Preview

# Gated PR preview for the repo_config Pulumi module.
#
# When enabled, runs `pulumi preview --diff` against the repo_config stack on
# pull requests that touch the module, and posts the diff back to the PR as a
# single updating comment so reviewers can see the proposed GitHub-settings
# change before it is applied (via the separate apply/up workflow on merge).
#
# DISABLED BY DEFAULT — opt in by setting the repository variable
# REPO_CONFIG_PREVIEW_ENABLED=true (Settings -> Secrets and variables ->
# Actions -> Variables). The shared GitHub App (created once per org via
# `bazel run //tools/pulumi:create-app`) supplies the Pulumi GitHub provider
# credentials; set its app id in the PULUMI_APP_ID variable and its private key
# in the APP_PRIVATE_KEY secret, plus PULUMI_ACCESS_TOKEN for the Pulumi backend.
on:
    pull_request:
        paths: ["infrastructure/pulumi/repo_config/**"]

permissions:
    contents: read
    pull-requests: write

jobs:
    preview:
        if: ${{ "{{ vars.REPO_CONFIG_PREVIEW_ENABLED == 'true' }}" }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install Bazel
              uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
              with:
                  bazelisk-cache: true
                  repository-cache: true
                  bazelrc: |
                      common --announce_rc --color=yes --curses=yes
                      common --show_progress_rate_limit=60 --show_timestamps

            - name: Mint a GitHub App token for the Pulumi GitHub provider
              id: app-token
              uses: actions/create-github-app-token@v2
              with:
                  app-id: ${{ "{{ vars.PULUMI_APP_ID }}" }}
                  private-key: ${{ "{{ secrets.APP_PRIVATE_KEY }}" }}

            - name: Pulumi preview (repo_config)
              env:
                  GITHUB_TOKEN: ${{ "{{ steps.app-token.outputs.token }}" }}
                  GITHUB_OWNER: ${{ "{{ github.repository_owner }}" }}
                  PULUMI_ACCESS_TOKEN: ${{ "{{ secrets.PULUMI_ACCESS_TOKEN }}" }}
              run: bazel run //infrastructure/pulumi/repo_config:preview -- --stack dev --diff 2>&1 | tee /tmp/repo-config-preview.txt

            - name: Post preview diff as a PR comment
              uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
              with:
                  header: repo-config-preview
                  path: /tmp/repo-config-preview.txt
