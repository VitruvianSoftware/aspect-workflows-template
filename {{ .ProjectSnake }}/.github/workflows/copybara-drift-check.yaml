{{ end }}{{ end }}name: Copybara Drift Check

# FAIL-LOUD divergence detector for the bidirectional sync, across ALL components.
#
# The sync itself does NOT fail loud on a true conflict: if the same content is
# edited on both repos within one sync cycle, each direction overwrites the other
# and the repos silently DIVERGE. This job closes that gap: for each component it
# compares monorepo/<component>/ against the standalone repo root (applying the
# same context-file excludes) and goes RED if they differ.
#
# A component is only checked once it has been SEEDED (its standalone history
# carries the MONOREPO_REV_ID label); un-seeded components are skipped, not failed.
#
# Runs: right after each sync (workflow_run), on a 30-minute schedule (backstop),
# and on demand.
#
# RUNBOOK — fill in these two values before enabling:
#   1. GITHUB_ORG env var below: set to your GitHub organisation name.
#   2. COMPONENTS env var below: space-separated list of component names.
#      Must match the subdirectory names under the monorepo root AND the
#      standalone repository names (e.g. "my-lib other-lib").
#   3. Add a secret per component: <COMPONENT_UPPER>_SYNC_SSH_KEY
#      (e.g. MY_LIB_SYNC_SSH_KEY for component "my-lib").
#   4. Update the workflow_run trigger list below to match your per-component
#      export/import workflow names.
on:
    workflow_run:
        # TODO: replace with your per-component caller workflow names once added,
        # e.g. "Copybara Export (my-lib)" / "Copybara Import (my-lib)".
        # The placeholder below keeps the workflow valid until you add real callers.
        workflows:
            - "Copybara Export (placeholder)"
            - "Copybara Import (placeholder)"
        types: [completed]
    schedule:
        - cron: "*/30 * * * *"
    workflow_dispatch: {}

permissions:
    contents: read

concurrency:
    group: copybara-drift-check
    cancel-in-progress: true

jobs:
    drift-check:
        runs-on: ubuntu-latest
        env:
            # TODO: set to your GitHub organisation (e.g. "my-org").
            GITHUB_ORG: YOUR_GITHUB_ORG
            # TODO: space-separated component names (subdirs + standalone repo names).
            # Example: "my-lib other-lib"
            COMPONENTS: ""
            # Add one secret per component: <COMPONENT_UPPER>_SYNC_SSH_KEY.
            # GitHub Actions cannot index secrets by a variable, so list them explicitly.
            # Example (uncomment and repeat for each component):
            # MY_LIB_SYNC_SSH_KEY: ${{ "{{ secrets.MY_LIB_SYNC_SSH_KEY }}" }}
        steps:
            - uses: actions/checkout@v6

            - name: Install Bazel
              uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
              with:
                  bazelisk-cache: true
                  repository-cache: true
                  bazelrc: |
                      common --announce_rc --color=yes --curses=yes
                      common --show_progress_rate_limit=60 --show_timestamps

            - name: Check all seeded components for drift (fail on divergence)
              run: |
                  # bazel run //tools/copybara/drift_check handles SSH key rotation
                  # per-component (reads <COMP_UPPER>_SYNC_SSH_KEY from env), clones
                  # each standalone, and fails if any seeded component has diverged.
                  # shellcheck disable=SC2086
                  bazel run //tools/copybara/drift_check -- \
                    --org "$GITHUB_ORG" \
                    "$GITHUB_WORKSPACE" \
                    $COMPONENTS
